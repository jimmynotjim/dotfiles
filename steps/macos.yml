- defaults:
    link:
      relink: true
      create: true
      force: true
    shell:
      quiet: true
      stdout: true
      stderr: true

- clean: ["~"]

- shell:
    - command: |
        if ! xcode-select -p > /dev/null 2>&1; then
          xcode-select --install && sudo xcode-select --switch /Library/Developer/CommandLineTools
        else
          echo "Command Line Tools are already installed"
        fi
      description: Installing Command Line Tools
    - command: |
        if ! [ -d ~/.oh-my-zsh ]; then
          sh -c "$(curl -fsSL https://raw.github.com/ohmyzsh/ohmyzsh/master/tools/install.sh)" "" --unattended
        else
          echo "Oh-My-Zsh is already installed"
        fi
      description: Installing Oh-My-Zsh
    - command: |
        if ! [ -d ${ZSH_CUSTOM:-~/.oh-my-zsh/custom}/plugins/zsh-autosuggestions ]; then
          git clone https://github.com/zsh-users/zsh-autosuggestions ${ZSH_CUSTOM:-~/.oh-my-zsh/custom}/plugins/zsh-autosuggestions
        else
          echo "Zsh Autosuggest plugin is already installed"
        fi
      description: Installing Zsh Autocomplete plugin
    - command: |
        if ! [ -d ${ZSH_CUSTOM:-~/.oh-my-zsh/custom}/plugins/zsh-syntax-highlighting ]; then
          git clone https://github.com/zsh-users/zsh-syntax-highlighting.git ${ZSH_CUSTOM:-~/.oh-my-zsh/custom}/plugins/zsh-syntax-highlighting
        else
          echo "Zsh Syntax Highlighting plugin is already installed"
        fi
      description: Installing Zsh Syntax Highlighting plugin

- create:
    - ~/Desktop/screenshots
    - ~/repos/work
    - ~/repos/personal

- shell:
    - command: |
        for f in ~/.gitconfig ~/.gitignore ~/.zshrc ~/.zprofile ~/.ssh/config ~/.claude/claude.md ~/.claude/settings.json; do
          if [ -f "$f" ] && [ ! -L "$f" ]; then
            cp "$f" "${f}.bak"
            echo "Backed up $f -> ${f}.bak"
          fi
        done
      description: Backing up existing config files

- link:
    ~/.gitconfig: configs/gitconfig
    ~/.gitignore: configs/gitignore
    ~/.zprofile: configs/zprofile
    ~/.ssh/config: configs/ssh_config
    ~/.claude/claude.md: configs/claude_doc
    ~/.claude/settings.json: configs/claude_settings

- shell:
    - command: |
        DOTFILES_ZSHRC="$(pwd)/configs/zshrc"
        SOURCE_LINE="source $DOTFILES_ZSHRC"
        LOCAL_LINE='[ -f ~/.zshrc.local ] && source ~/.zshrc.local'

        if [ -L ~/.zshrc ]; then
          rm ~/.zshrc
          printf '%s\n%s\n' "$SOURCE_LINE" "$LOCAL_LINE" > ~/.zshrc
          echo "Replaced symlink ~/.zshrc with sourcing stub"
        elif [ ! -f ~/.zshrc ]; then
          printf '%s\n%s\n' "$SOURCE_LINE" "$LOCAL_LINE" > ~/.zshrc
          echo "Created ~/.zshrc sourcing stub"
        else
          grep -qxF "$SOURCE_LINE" ~/.zshrc || echo "$SOURCE_LINE" >> ~/.zshrc
          grep -qxF "$LOCAL_LINE" ~/.zshrc || echo "$LOCAL_LINE" >> ~/.zshrc
          echo "~/.zshrc exists, ensured required lines present"
        fi
      description: Creating ~/.zshrc sourcing stub
    - command: bash -l './macos/install.sh'
      description: Installing macos system preferences
